<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Trova DAE - Fiumefreddo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; display:flex; }

#sidebar {
  width: 300px;
  height: 100vh;
  overflow-y: auto;
  background: #f7f7f7;
  border-right: 1px solid #ccc;
  padding: 10px;
}

#map {
  flex: 1;
  height: 100vh;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card:hover {
  background: #e6f2ff;
}

h2 {
  margin-top: 0;
}
</style>
</head>
<body>

<div id="sidebar">
  <h2>DAE disponibili</h2>
  <div id="list"></div>
</div>

<div id="map"></div>

<script>
// Mappa centrata su Fiumefreddo
var map = L.map('map').setView([37.791, 15.209], 14);

// Tile
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// Icona DAE
var daeIcon = L.icon({
  iconUrl: 'https://cdn-icons-png.flaticon.com/512/2967/2967350.png',
  iconSize: [30, 30]
});

// DATI DAE
var daeList = [
  {
    nome: "Piazza Municipio",
    lat: 37.7915,
    lng: 15.2102,
    info: "Accessibile H24"
  },
  {
    nome: "Campo Sportivo",
    lat: 37.7890,
    lng: 15.2050,
    info: "Solo durante eventi"
  },
  {
    nome: "Scuola Media",
    lat: 37.7930,
    lng: 15.2125,
    info: "Accesso limitato"
  }
];

var listDiv = document.getElementById("list");

// Loop DAE
daeList.forEach(function(dae) {

  // Marker
  var marker = L.marker([dae.lat, dae.lng], {icon: daeIcon})
    .addTo(map)
    .bindPopup("<b>" + dae.nome + "</b><br>" + dae.info);

  // Card sidebar
  var card = document.createElement("div");
  card.className = "card";
  card.innerHTML = "<b>" + dae.nome + "</b><br>" + dae.info;

  // Click su card → zoom
  card.onclick = function() {
    map.setView([dae.lat, dae.lng], 17);
    marker.openPopup();
  };

  listDiv.appendChild(card);
});

// GEOLOCALIZZAZIONE
map.locate({setView: true, maxZoom: 15});

map.on('locationfound', function(e) {
  L.marker(e.latlng).addTo(map)
    .bindPopup("Sei qui").openPopup();
});

</script>

</body>
</html>
