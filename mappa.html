<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Trova DAE - Fiumefreddo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
}

/* SIDEBAR */
#sidebar {
  width: 320px;
  height: 100vh;
  overflow-y: auto;
  background: #ffffff;
  border-right: 4px solid #d32f2f;
  padding: 15px;
}

#sidebar h2 {
  color: #d32f2f;
  text-align: center;
}

/* MAPPA */
#map {
  flex: 1;
  height: 100vh;
}

/* CARD DAE */
.card {
  background: white;
  padding: 12px;
  margin-bottom: 12px;
  border-left: 5px solid #d32f2f;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #ffecec;
}

/* HEADER */
.header {
  background: #d32f2f;
  color: white;
  padding: 10px;
  text-align: center;
  font-weight: bold;
  border-radius: 8px;
  margin-bottom: 15px;
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="header">❤️ Trova DAE</div>
  <h2>Fiumefreddo</h2>
  <div id="list"></div>
</div>

<div id="map"></div>

<script>
// MAPPA
var map = L.map('map').setView([37.791, 15.209], 14);

// TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ICONA ROSSA (marker semplice)
var daeIcon = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});

// DATI DAE
var daeList = [
  {
    nome: "Piazza Municipio",
    lat: 37.7915,
    lng: 15.2102,
    info: "Accessibile H24"
  },
  {
    nome: "Campo Sportivo",
    lat: 37.7890,
    lng: 15.2050,
    info: "Solo durante eventi"
  },
  {
    nome: "Scuola Media",
    lat: 37.7930,
    lng: 15.2125,
    info: "Accesso limitato"
  }
];

var listDiv = document.getElementById("list");

// LOOP
daeList.forEach(function(dae) {

  var marker = L.marker([dae.lat, dae.lng], {icon: daeIcon})
    .addTo(map)
    .bindPopup("<b style='color:#d32f2f'>" + dae.nome + "</b><br>" + dae.info);

  var card = document.createElement("div");
  card.className = "card";
  card.innerHTML = "<b>" + dae.nome + "</b><br>" + dae.info;

  card.onclick = function() {
    map.setView([dae.lat, dae.lng], 17);
    marker.openPopup();
  };

  listDiv.appendChild(card);
});

// GEOLOCALIZZAZIONE
map.locate({setView: true, maxZoom: 15});

map.on('locationfound', function(e) {
  L.circle(e.latlng, {
    radius: 30,
    color: '#d32f2f',
    fillColor: '#d32f2f',
    fillOpacity: 0.5
  }).addTo(map).bindPopup("Sei qui");
});
</script>

</body>
</html>
